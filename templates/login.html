<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AP Bus Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-xl p-8">
            <!-- Logo and Title -->
            <div class="text-center mb-8">
                <i class="fas fa-bus text-white text-4xl mb-4"></i>
                <h1 class="text-2xl font-bold text-white">AP Bus Booking</h1>
                <p class="text-purple-100">Sign in to your account</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="space-y-4">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-user mr-2"></i>Username
                        </label>
                        <input type="text" id="username" name="username" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                               placeholder="Enter your username">
                    </div>
                    
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2"></i>Password
                        </label>
                        <input type="password" id="password" name="password" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                               placeholder="Enter your password">
                    </div>
                </div>

                <div class="mt-6">
                    <button type="submit" 
                            class="w-full py-3 px-4 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-lg font-semibold transition duration-200 flex items-center justify-center hover:from-purple-700 hover:to-pink-700">
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        Sign In
                    </button>
                </div>
            </form>

            <!-- Register Link -->
            <div class="mt-6 text-center">
                <p class="text-purple-100">
                    Don't have an account? 
                    <a href="/register" class="text-white font-bold hover:text-purple-200">
                        Sign up
                    </a>
                </p>
            </div>

            <!-- Demo Account Info -->
            <div class="mt-8 p-4 bg-purple-800 bg-opacity-50 rounded-lg border border-purple-600">
                <p class="text-sm text-purple-100 mb-2">
                    <i class="fas fa-info-circle mr-2"></i>
                    Demo Account (for testing):
                </p>
                <p class="text-xs text-purple-200">Username: demo</p>
                <p class="text-xs text-purple-200">Password: demo123</p>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="fixed top-4 right-4 hidden">
        <div class="bg-white border-l-4 p-4 rounded-lg shadow-lg max-w-sm">
            <div class="flex items-center">
                <i class="fas fa-exclamation-circle text-red-500 mr-3"></i>
                <p id="notificationMessage" class="font-medium"></p>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const formData = new FormData(event.target);
            const data = {
                username: formData.get('username'),
                password: formData.get('password')
            };

            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/';
                } else {
                    showNotification(data.error || 'Login failed', 'error');
                }
            })
            .catch(error => {
                showNotification('Error during login', 'error');
            });
        }

        function showNotification(message, type = 'error') {
            const notification = document.getElementById('notification');
            const messageElement = document.getElementById('notificationMessage');
            const icon = notification.querySelector('i');
            
            messageElement.textContent = message;
            
            if (type === 'error') {
                icon.className = 'fas fa-exclamation-circle text-red-500 mr-3';
                notification.querySelector('div').className = 'bg-white border-l-4 border-red-500 p-4 rounded-lg shadow-lg max-w-sm';
            } else {
                icon.className = 'fas fa-check-circle text-green-500 mr-3';
                notification.querySelector('div').className = 'bg-white border-l-4 border-green-500 p-4 rounded-lg shadow-lg max-w-sm';
            }
            
            notification.classList.remove('hidden');
            
            setTimeout(() => {
                notification.classList.add('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
